<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Searcher</title>
    <style>
        body { background: #0b0b0b; color: #eee; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        input { width: 70%; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
        button { padding: 12px 18px; border-radius: 20px; border: none; background: #1db954; color: white; cursor: pointer; font-weight: bold; margin-left: 10px; }
        #status { margin: 15px 0; color: #1db954; font-size: 14px; }
        .track { background: #181818; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; cursor: pointer; }
        .track:hover { background: #282828; }
    </style>
</head>
<body>
    <div class="container">
        <div style="position: sticky; top: 0; background: #0b0b0b; padding-bottom: 10px; z-index: 10;">
            <input type="text" id="q" placeholder="Macan, Miyagi, Моргенштерн" onkeypress="if(event.key==='Enter') search()">
            <button onclick="search()">Найти</button>
            <div id="status"></div>
        </div>
        <div id="res"></div>
    </div>

    <script>
        async function search() {
            const query = document.getElementById('q').value.trim();
            if (!query) return;

            const status = document.getElementById('status');
            const res = document.getElementById('res');
            
            status.innerText = 'Ищу... 🔍';
            res.innerHTML = '';

            // Публичный YouTube Music поиск (CORS-free)
            const url = `https://music.youtube.com/search?q=${encodeURIComponent(query)}`;

            // Создаём iframe с результатами поиска
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.width = '100%';
            iframe.height = '600';
            iframe.frameBorder = '0';
            iframe.allow = 'autoplay; encrypted-media';
            iframe.style.borderRadius = '10px';

            status.innerText = 'Готово! 🎵';
            res.appendChild(iframe);
        }
    </script>
</body>
</html>
