<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music App Fix</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .search-box { position: sticky; top: 0; background: #000; padding: 10px 0; z-index: 10; }
        input { width: 65%; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #111; color: #fff; outline: none; }
        button { padding: 12px; border-radius: 20px; border: none; background: #1db954; color: #fff; font-weight: bold; cursor: pointer; }
        .track { background: #111; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #222; text-align: left; }
        img { width: 50px; height: 50px; border-radius: 5px; float: left; margin-right: 15px; }
        audio { width: 100%; height: 30px; margin-top: 10px; filter: invert(1); }
        .clear { clear: both; }
    </style>
</head>
<body>

    <div class="search-box">
        <h2>🎵 Music Wave</h2>
        <input type="text" id="q" placeholder="Macan, Queen, Miyagi...">
        <button onclick="search()">Найти</button>
    </div>

    <div id="status" style="margin: 10px; color: #1db954;"></div>
    <div id="res"></div>

    <script>
        async function search() {
            const q = document.getElementById('q').value.trim();
            if(!q) return;
            
            const status = document.getElementById('status');
            const res = document.getElementById('res');
            
            status.innerText = 'Ищу через зеркало... 🚀';
            res.innerHTML = '';

            try {
                // Используем открытое API Deezer через прокси-сервер для обхода блокировок
                const url = `https://api.allorigins.win{encodeURIComponent('https://api.deezer.com' + q)}`;
                
                const response = await fetch(url);
                const rawData = await response.json();
                const data = JSON.parse(rawData.contents);

                status.innerText = '';
                
                if (!data.data || data.data.length === 0) {
                    status.innerText = 'Ничего не найдено.';
                    return;
                }

                data.data.forEach(t => {
                    if(t.preview) {
                        res.innerHTML += `
                            <div class="track">
                                <img src="${t.album.cover_medium}">
                                <div style="font-weight:bold; font-size:14px; overflow:hidden;">${t.title_short}</div>
                                <div style="font-size:12px; color:#999;">${t.artist.name}</div>
                                <div class="clear"></div>
                                <audio controls src="${t.preview}"></audio>
                            </div>`;
                    }
                });
            } catch (error) {
                console.error(error);
                status.innerText = 'Ошибка. Попробуй еще раз.';
            }
        }

        // Поиск по Enter
        document.getElementById('q').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
