<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Searcher с консолью</title>
    
    <!-- ✅ КОНСОЛЬ ERUDA ДЛЯ ТЕЛЕФОНА (иконка в правом верхнем углу) -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <style>
        body { background: #0b0b0b; color: #eee; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        input { width: 70%; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
        button { padding: 12px 18px; border-radius: 20px; border: none; background: #1db954; color: white; cursor: pointer; font-weight: bold; margin-left: 10px; }
        #status { margin: 15px 0; color: #1db954; font-size: 14px; }
        .track { background: #181818; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        .track:hover { background: #282828; transform: translateY(-1px); }
        img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .info { flex: 1; }
        .title { display: block; font-weight: bold; font-size: 14px; }
        .artist { font-size: 12px; color: #aaa; }
        audio { width: 120px; height: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div style="position: sticky; top: 0; background: #0b0b0b; padding-bottom: 10px; z-index: 10;">
            <input type="text" id="q" placeholder="Macan, Miyagi, Drake, radiohead" onkeypress="if(event.key==='Enter') search()">
            <button onclick="search()">🔍 Найти</button>
            <div id="status">🖥️ Консоль в правом верхнем углу!</div>
        </div>
        <div id="res"></div>
    </div>

    <script>
        async function search() {
            const query = document.getElementById('q').value.trim();
            if (!query) return;

            const status = document.getElementById('status');
            const res = document.getElementById('res');
            
            status.innerText = 'Ищу через API... 🔍';
            res.innerHTML = '';
            
            // ✅ Логи в консоль Eruda
            console.log('🔍 Поиск:', query);

            try {
                const url = `https://ws.audioscrobbler.com/2.0/?method=track.search&track=${encodeURIComponent(query)}&api_key=4a8a6c71903e4e9a9b0f9c8a2d3e4f5a&format=json&limit=10`;
                
                console.log('🌐 API URL:', url);
                
                const response = await fetch(url);
                const data = await response.json();

                // ✅ ПОЛНЫЙ API ОТВЕТ В КОНСОЛИ
                console.log('📦 Полный API ответ:', data);
                console.log('🔍 data.results:', data.results);

                if (!data.results) {
                    status.innerText = 'API пустой. Тест: radiohead';
                    console.error('❌ Нет data.results');
                    return;
                }

                const tracks = data.results.trackmatches?.track || [];
                console.log('🎵 Треки найдены:', tracks.length, tracks);
                
                status.innerText = `Найдено: ${tracks.length} треков`;

                if (tracks.length === 0) {
                    status.innerText = 'Треки не найдены 😔';
                    return;
                }

                tracks.slice(0, 10).forEach((track, i) => {
                    console.log(`#${i+1}:`, track.name, '-', track.artist);
                    
                    const div = document.createElement('div');
                    div.className = 'track';
                    div.innerHTML = `
                        <img src="https://via.placeholder.com/50/1db954/000?text=🎵" alt="Обложка">
                        <div class="info">
                            <span class="title">${track.name || 'Неизвестный'}</span>
                            <span class="artist">${track.artist || 'Неизвестный'}</span>
                        </div>
                        <audio controls src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav"></audio>
                    `;
                    res.appendChild(div);
                });

            } catch (error) {
                console.error('💥 Ошибка:', error);
                status.innerHTML = '<span style="color:#ff6b6b">Ошибка сети</span>';
            }
        }
    </script>
</body>
</html>
