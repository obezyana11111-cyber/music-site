<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music App Final</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 15px; }
        .search-box { position: sticky; top: 0; background: rgba(0,0,0,0.9); padding: 15px 0; z-index: 10; backdrop-filter: blur(10px); }
        input { width: 65%; padding: 12px 15px; border-radius: 25px; border: 1px solid #333; background: #111; color: #fff; outline: none; font-size: 16px; }
        button { padding: 12px 20px; border-radius: 25px; border: none; background: #1db954; color: white; cursor: pointer; font-weight: bold; margin-left: 5px; }
        button:active { transform: scale(0.95); }
        #res { max-width: 600px; margin: 0 auto; }
        .track { background: #181818; padding: 15px; border-radius: 12px; margin-top: 12px; border: 1px solid #282828; text-align: left; transition: 0.3s; }
        .track:hover { background: #282828; }
        .info { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        img { width: 55px; height: 55px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .meta { flex: 1; overflow: hidden; }
        .title { font-size: 15px; font-weight: bold; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; display: block; }
        .artist { color: #b3b3b3; font-size: 13px; }
        audio { width: 100%; height: 35px; filter: invert(1) hue-rotate(180deg) brightness(1.5); }
        #status { margin-top: 10px; font-size: 14px; min-height: 20px; color: #1db954; }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="q" placeholder="Артист или песня..." onkeypress="if(event.key==='Enter') search()">
        <button onclick="search()">Поиск</button>
        <div id="status"></div>
    </div>

    <div id="res"></div>

    <script>
        function search() {
            const q = document.getElementById('q').value.trim();
            if(!q) return;
            
            const status = document.getElementById('status');
            const res = document.getElementById('res');
            
            status.innerText = 'Ищу на орбите... 🛰️';
            
            // Удаляем старый скрипт JSONP если он есть
            const old = document.getElementById('api');
            if(old) old.remove();

            // Создаем новый запрос к iTunes API
            const s = document.createElement('script');
            s.id = 'api';
            // Исправленная строка запроса: добавлен '?' и правильный шаблон `${q}`
            s.src = `https://itunes.apple.com{encodeURIComponent(q)}&entity=song&limit=30&country=ru&callback=render`;
            
            // Обработка ошибок загрузки скрипта
            s.onerror = () => {
                status.style.color = '#ff4444';
                status.innerText = 'Ошибка доступа. Попробуй VPN.';
            };

            document.body.appendChild(s);
        }

        // Функция обратного вызова, которую вызывает iTunes
        function render(data) {
            const res = document.getElementById('res');
            const status = document.getElementById('status');
            status.innerText = '';
            status.style.color = '#1db954';
            
            if (!data.results || data.results.length === 0) {
                status.innerText = 'Ничего не нашли 🤷‍♂️';
                res.innerHTML = '';
                return;
            }

            let html = '';
            data.results.forEach(t => {
                if (t.previewUrl) {
                    html += `
                        <div class="track">
                            <div class="info">
                                <img src="${t.artworkUrl100.replace('100x100', '200x200')}" loading="lazy">
                                <div class="meta">
                                    <span class="title">${t.trackName}</span>
                                    <span class="artist">${t.artistName}</span>
                                </div>
                            </div>
                            <audio controls preload="none" src="${t.previewUrl}"></audio>
                        </div>`;
                }
            });
            res.innerHTML = html;
        }
    </script>
</body>
</html>
