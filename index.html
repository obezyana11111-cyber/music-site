<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My TG Music</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #000; color: #fff; text-align: center; padding: 20px; margin: 0;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { color: #1db954; margin-bottom: 30px; }
        .track { 
            background: #121212; padding: 15px; border-radius: 12px; 
            margin-bottom: 15px; border: 1px solid #282828; text-align: left;
        }
        .track-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; display: block; color: #fff; }
        audio { width: 100%; height: 35px; filter: invert(1); }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎵 Мой Плейлист</h2>

        <div class="track">
            <span class="track-title">Interstellar on Piano</span>
            <audio controls src="Andy_Morris_-_Interstellar_on_Piano_75661143.mp3"></audio>
        </div>

        <div class="track">
            <span class="track-title">SQWOZ BAB - Купер</span>
            <audio controls src="sqwoz-bab-kuper.mp3"></audio>
        </div>

        <div class="track">
            <span class="track-title">MORGENSHTERN - Последняя любовь</span>
            <audio controls src="morgenshtern-poslednjaja-ljubov.mp3"></audio>
        </div>

        <div class="track">
            <span class="track-title">MORGENSHTERN - Пустой вокзал</span>
            <audio controls src="1739634289_morgenshtern-pustoi-vokzal.mp3"></audio>
        </div>

        <div class="track">
            <span class="track-title">Трек 42df91f7</span>
            <audio controls src="42df91f71df7cab.mp3"></audio>
        </div>
    </div>
</body>
</html>
