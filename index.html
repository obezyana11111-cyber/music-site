<script>
    function searchGlobal() {
        const q = document.getElementById('q').value.trim();
        if (!q) return;

        const status = document.getElementById('status');
        status.innerText = 'Ищу в глобальной базе...через спутник 🛰️';

        // Удаляем старый скрипт если он был
        const oldScript = document.getElementById('jsonp-search');
        if (oldScript) oldScript.remove();

        // Создаем магическую ссылку для обхода блокировки
        const script = document.createElement('script');
        script.id = 'jsonp-search';
        script.src = `https://itunes.apple.com{encodeURIComponent(q)}&entity=song&limit=15&country=ru&callback=handleResponse`;
        
        document.body.appendChild(script);
    }

    // Эта функция сработает, когда Apple ответит
    function handleResponse(data) {
        const resBox = document.getElementById('global-results');
        const status = document.getElementById('status');
        const globalTitle = document.getElementById('global-title');

        resBox.innerHTML = '';
        status.innerText = '';

        if (!data.results || data.results.length === 0) {
            status.innerText = 'Ничего не нашли. Попробуй другое имя.';
            return;
        }

        globalTitle.style.display = 'block';
        data.results.forEach(t => {
            if (t.previewUrl) {
                resBox.innerHTML += `
                    <div class="card">
                        <img src="${t.artworkUrl100.replace('100x100', '300x300')}">
                        <div class="info" style="flex:1;">
                            <div style="font-weight:bold;">${t.trackName}</div>
                            <span style="color:#aaa; font-size:12px;">${t.artistName}</span>
                            <audio controls src="${t.previewUrl}" style="width:100%; margin-top:5px; filter:invert(1);"></audio>
                        </div>
                    </div>`;
            }
        });
    }

    // Поиск по Enter
    document.getElementById('q').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') searchGlobal();
    });
</script>
