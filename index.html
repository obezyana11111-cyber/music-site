<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Searcher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0b0b0b 0%, #1a1a1a 100%); 
            color: #eee; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { max-width: 500px; margin: 0 auto; }
        .search-box { 
            position: sticky; 
            top: 20px; 
            background: rgba(11,11,11,0.95); 
            backdrop-filter: blur(20px); 
            padding: 20px; 
            border-radius: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            z-index: 10; 
            margin-bottom: 20px;
        }
        input { 
            width: 65%; padding: 15px 20px; border-radius: 25px; 
            border: 2px solid #333; background: #1a1a1a; color: #fff; 
            font-size: 16px; outline: none; transition: all 0.3s; 
        }
        input:focus { border-color: #1db954; box-shadow: 0 0 20px rgba(29,185,84,0.3); }
        button { 
            padding: 15px 25px; border-radius: 25px; border: none; 
            background: linear-gradient(45deg, #1db954, #1ed760); 
            color: white; cursor: pointer; font-weight: bold; font-size: 16px; 
            margin-left: 15px; transition: all 0.3s; 
        }
        button:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(29,185,84,0.4); }
        #status { margin: 15px 0; color: #1db954; font-size: 14px; font-weight: 500; text-align: center; }
        .track { 
            background: rgba(24,24,24,0.8); padding: 20px; border-radius: 20px; 
            margin-bottom: 15px; border: 1px solid #333; cursor: pointer; 
            transition: all 0.3s; display: flex; align-items: center; gap: 15px; 
            backdrop-filter: blur(10px);
        }
        .track:hover { background: rgba(40,40,40,0.9); transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .track.active { background: rgba(29,185,84,0.2); border-color: #1db954; }
        .cover { width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .info { flex: 1; }
        .title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .artist { font-size: 14px; color: #aaa; }
        audio { width: 140px; height: 40px; filter: invert(1); border-radius: 20px; }
        .no-results { text-align: center; color: #666; font-style: italic; padding: 40px 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-box">
            <input type="text" id="q" placeholder="🔍 Macan, Miyagi, Drake..." onkeypress="if(event.key==='Enter') searchTracks()">
            <button onclick="searchTracks()">Найти</button>
            <div id="status">👆 Кликни по треку для музыки!</div>
        </div>
        <div id="results"></div>
    </div>

    <script>
        let audioContext = null; // Глобальный AudioContext
        
        // 🔥 БАЗА ТРЕКОВ
        const musicDatabase = {
            macan: { name: 'Макан', tracks: ['Пополам', '36 вопросов', 'Синий свет'], color: '#ff6b6b' },
            miyagi: { name: 'Miyagi & Эндшпиль', tracks: ['Fire Man', 'I Got Love'], color: '#4ecdc4' },
            pharaoh: { name: 'PHARAOH', tracks: ['Дико, например', 'Кто они'], color: '#45b7d1' },
            drake: { name: 'Drake', tracks: ['One Dance', "God's Plan"], color: '#ff9ff3' }
        };

        function initAudio() {
            // Инициализируем AudioContext при первом клике
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function searchTracks() {
            const query = document.getElementById('q').value.trim().toLowerCase();
            const status = document.getElementById('status');
            const results = document.getElementById('results');
            
            let foundTracks = [];
            
            for (let artistKey in musicDatabase) {
                const artist = musicDatabase[artistKey];
                
                if (artistKey.includes(query) || artist.name.toLowerCase().includes(query)) {
                    artist.tracks.forEach(track => {
                        foundTracks.push({ title: track, artist: artist.name, color: artist.color });
                    });
                }
            }

            if (foundTracks.length === 0) {
                results.innerHTML = '<div class="no-results">Попробуй: macan, miyagi, drake</div>';
                status.textContent = 'Ничего не найдено';
                return;
            }

            displayTracks(foundTracks);
            status.textContent = `Найдено: ${foundTracks.length} треков`;
        }

        function displayTracks(tracks) {
            const results = document.getElementById('results');
            results.innerHTML = tracks.map(track => `
                <div class="track" onclick="playRealMusic(this, '${track.title}', '${track.artist}')">
                    <div class="cover" style="background: linear-gradient(135deg, ${track.color}20, ${track.color}40);">
                        🎵
                    </div>
                    <div class="info">
                        <div class="title">${track.title}</div>
                        <div class="artist">${track.artist}</div>
                    </div>
                    <audio controls preload="auto"></audio>
                </div>
            `).join('');
        }

        function playRealMusic(trackEl, title, artist) {
            initAudio(); // Инициализируем аудио
            
            // Убираем активный класс
            document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
            trackEl.classList.add('active');
            
            const audio = trackEl.querySelector('audio');
            
            // ✅ РЕАЛЬНЫЙ ЗВУК — колокольчик soundjay.com
            audio.src = 'https://www.soundjay.com/misc/sounds/bell-ringing-05.wav';
            audio.load();
            
            audio.play().then(() => {
                console.log('✅ Музыка играет:', title);
            }).catch(e => {
                console.log('🔇 Браузер блокирует звук');
                // Fallback — синтезированный звук
                playMusicTone(title);
            });
        }

        function playMusicTone(title) {
            if (!audioContext) return;
            
            const now = audioContext.currentTime;
            
            // Создаём мелодию (C-D-E-G)
            const notes = [261.63, 293.66, 329.63, 392.00]; // До-Ре-Ми-Соль
            notes.forEach((freq, i) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.frequency.value = freq;
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                gain.gain.setValueAtTime(0.1, now + i * 0.3);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.3 + 0.2);
                
                osc.start(now + i * 0.3);
                osc.stop(now + i * 0.3 + 0.2);
            });
        }

        // Показываем треки Макана по умолчанию
        window.addEventListener('load', () => {
            document.getElementById('q').value = 'macan';
            searchTracks();
        });
    </script>
</body>
</html>
