<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Searcher</title>
    <style>
        body { background: #0b0b0b; color: #eee; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        input { width: 70%; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
        button { padding: 12px 18px; border-radius: 20px; border: none; background: #1db954; color: white; cursor: pointer; font-weight: bold; margin-left: 10px; }
        #status { margin: 15px 0; color: #1db954; font-size: 14px; }
        .track { background: #181818; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; }
        .track-info { display: flex; align-items: center; gap: 12px; }
        img { width: 50px; height: 50px; border-radius: 4px; }
        .names { flex: 1; }
        .title { display: block; font-weight: bold; font-size: 14px; }
        .artist { font-size: 12px; color: #aaa; }
        audio { width: 100%; height: 30px; margin-top: 8px; filter: invert(1); }
    </style>
</head>
<body>
    <div class="container">
        <div style="position: sticky; top: 0; background: #0b0b0b; padding-bottom: 10px; z-index: 10;">
            <input type="text" id="q" placeholder="Напр: Macan или Miyagi" onkeypress="if(event.key==='Enter') search()">
            <button onclick="search()">Найти</button>
            <div id="status"></div>
        </div>
        <div id="res"></div>
    </div>

    <script>
        async function search() {
            const query = document.getElementById('q').value.trim();
            if (!query) return;

            const status = document.getElementById('status');
            const res = document.getElementById('res');
            
            status.innerText = 'Ищу... 🔍';
            res.innerHTML = '';

            // Правильный URL iTunes API через CORS-прокси для GitHub Pages
            const encodedQuery = encodeURIComponent(query);
            const url = `https://corsproxy.io/?${encodedURIComponent(`https://itunes.apple.com/search?term=${encodedQuery}&entity=song&limit=20&country=ru`)}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('API недоступен');
                const data = await response.json();

                status.innerText = '';
                
                if (data.resultCount === 0) {
                    status.innerText = 'Ничего не найдено ⛔';
                    return;
                }

                data.results.forEach(t => {
                    if (t.previewUrl) {
                        const div = document.createElement('div');
                        div.className = 'track';
                        div.innerHTML = `
                            <div class="track-info">
                                <img src="${t.artworkUrl100}" alt="Обложка">
                                <div class="names">
                                    <span class="title">${t.trackName}</span>
                                    <span class="artist">${t.artistName}</span>
                                </div>
                            </div>
                            <audio controls src="${t.previewUrl}"></audio>
                        `;
                        res.appendChild(div);
                    }
                });
            } catch (error) {
                console.error(error);
                status.innerHTML = '<span style="color:#ff6b6b">Ошибка сети или API. Попробуйте VPN или другой запрос.</span>';
            }
        }
    </script>
</body>
</html>
