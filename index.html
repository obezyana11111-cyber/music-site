<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Searcher</title>
    
    <!-- Консоль Eruda для телефона -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <style>
        body { background: #0b0b0b; color: #eee; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        input { width: 70%; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
        button { padding: 12px 18px; border-radius: 20px; border: none; background: #1db954; color: white; cursor: pointer; font-weight: bold; margin-left: 10px; }
        #status { margin: 15px 0; color: #1db954; font-size: 14px; }
        .track { background: #181818; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        .track:hover { background: #282828; transform: translateY(-1px); }
        img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .info { flex: 1; }
        .title { display: block; font-weight: bold; font-size: 14px; }
        .artist { font-size: 12px; color: #aaa; }
        audio { width: 120px; height: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div style="position: sticky; top: 0; background: #0b0b0b; padding-bottom: 10px; z-index: 10;">
            <input type="text" id="q" placeholder="Macan, Miyagi, Drake, Radiohead" onkeypress="if(event.key==='Enter') search()">
            <button onclick="search()">🔍 Найти</button>
            <div id="status">🖥️ Консоль в правом верхнем углу</div>
        </div>
        <div id="res"></div>
    </div>

    <script>
        async function search() {
            const query = document.getElementById('q').value.trim();
            if (!query) return;

            const status = document.getElementById('status');
            const res = document.getElementById('res');
            
            status.innerText = 'Ищу через Discogs API... 🔍';
            res.innerHTML = '';
            
            console.log('🔍 Поиск:', query);

            try {
                // Discogs API — публичный поиск без ключа!
                const url = `https://api.discogs.com/database/search?q=${encodeURIComponent(query)}&type=artist&format=artist&per_page=10`;
                
                console.log('🌐 API URL:', url);
                
                const response = await fetch(url, {
                    headers: { 'User-Agent': 'MusicSearcher/1.0' }
                });
                
                const data = await response.json();
                console.log('📦 API ответ:', data);

                const results = data.results || [];
                console.log('🎵 Найдено:', results.length);
                
                status.innerText = `Найдено: ${results.length} исполнителей`;

                if (results.length === 0) {
                    status.innerText = 'Артисты не найдены';
                    return;
                }

                results.slice(0, 10).forEach((artist, i) => {
                    console.log(`#${i+1}:`, artist.title);
                    
                    const div = document.createElement('div');
                    div.className = 'track';
                    div.innerHTML = `
                        <img src="${artist.cover_image || 'https://via.placeholder.com/50/1db954/000?text=🎵'}" alt="Обложка" onerror="this.src='https://via.placeholder.com/50/1db954/000?text=🎵'">
                        <div class="info">
                            <span class="title">${artist.title}</span>
                            <span class="artist">Жанр: ${artist.genre?.[0] || 'Неизвестно'}</span>
                        </div>
                        <audio controls src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" style="width: 120px;"></audio>
                    `;
                    res.appendChild(div);
                });

            } catch (error) {
                console.error('💥 Ошибка:', error);
                status.innerHTML = '<span style="color:#ff6b6b">Ошибка API</span>';
            }
        }
    </script>
</body>
</html>
