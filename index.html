<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Station</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 15px; }
        .header { position: sticky; top: 0; background: #000; padding: 10px 0; z-index: 10; border-bottom: 1px solid #222; }
        input { width: 65%; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; font-size: 16px; }
        button { padding: 12px 20px; border-radius: 25px; border: none; background: #1db954; color: #fff; font-weight: bold; cursor: pointer; }
        .track { background: #121212; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #282828; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        img { width: 60px; height: 60px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .info { flex: 1; min-width: 150px; }
        .info b { display: block; font-size: 15px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info span { color: #888; font-size: 13px; }
        audio { width: 100%; height: 35px; margin-top: 10px; filter: invert(1); }
        #status { margin-top: 15px; color: #1db954; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="q" placeholder="Артист или песня..." onkeypress="if(event.key==='Enter')search()">
        <button onclick="search()">Найти</button>
        <div id="status"></div>
    </div>

    <div id="res"></div>

    <script>
        // Этот метод работает БЕЗ блокировок (JSONP)
        function search() {
            const q = document.getElementById('q').value.trim();
            if(!q) return;
            
            document.getElementById('status').innerText = 'Ищу треки... 🚀';
            
            const oldScript = document.getElementById('api-script');
            if(oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'api-script';
            // Используем официальный поиск Deezer с обратным вызовом
            script.src = `https://api.deezer.com{encodeURIComponent(q)}&output=jsonp&callback=render`;
            document.body.appendChild(script);
        }

        function render(response) {
            const res = document.getElementById('res');
            const status = document.getElementById('status');
            status.innerText = '';
            res.innerHTML = '';
            
            if (!response.data || response.data.length === 0) {
                status.innerText = 'Ничего не найдено. Попробуй другое имя.';
                return;
            }

            response.data.forEach(t => {
                if(t.preview) {
                    res.innerHTML += `
                        <div class="track">
                            <img src="${t.album.cover_medium}">
                            <div class="info">
                                <b>${t.title}</b>
                                <span>${t.artist.name}</span>
                            </div>
                            <audio controls preload="none" src="${t.preview}"></audio>
                        </div>`;
                }
            });
        }
    </script>
</body>
</html>
