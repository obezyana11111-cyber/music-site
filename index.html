<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Music Player</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Поиск */
        .search-box { position: sticky; top: 0; background: #000; padding: 10px 0; z-index: 10; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
        button { background: #1db954; color: #fff; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        h2 { color: #1db954; font-size: 1.2rem; margin-top: 30px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        /* Карточки */
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .card { background: #121212; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #222; }
        .card img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .info { flex: 1; min-width: 0; }
        .info div { font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info span { color: #aaa; font-size: 12px; }
        audio { width: 100%; height: 30px; margin-top: 10px; filter: invert(1); }
    </style>
</head>
<body>

<div class="container">
    <!-- Блок Поиска -->
    <div class="search-box">
        <input type="text" id="q" placeholder="Поиск по всему миру (Macan, Queen...)" onkeypress="if(event.key==='Enter')searchGlobal()">
        <button onclick="searchGlobal()">Найти</button>
    </div>

    <div id="status" style="text-align: center; margin-top: 10px; color: #1db954;"></div>

    <!-- Твоя загруженная музыка (Локальная) -->
    <h2 id="local-title">📂 Твоя загруженная музыка</h2>
    <div class="grid" id="local-list">
        <!-- Сюда вставь свои треки из прошлого кода, если хочешь -->
        <div class="card">
            <div class="info">
                <div>Interstellar on Piano</div>
                <audio controls src="Andy_Morris_-_Interstellar_on_Piano_75661143.mp3"></audio>
            </div>
        </div>
    </div>

    <!-- Результаты глобального поиска -->
    <h2 id="global-title" style="display:none;">🌍 Результаты поиска</h2>
    <div class="grid" id="global-results"></div>
</div>

<script>
    async function searchGlobal() {
        const q = document.getElementById('q').value.trim();
        if (!q) return;

        const resBox = document.getElementById('global-results');
        const status = document.getElementById('status');
        const globalTitle = document.getElementById('global-title');

        status.innerText = 'Ищу в глобальной базе...';
        resBox.innerHTML = '';

        try {
            // Прямой запрос к Apple API (разрешен на GitHub Pages)
            const response = await fetch(`https://itunes.apple.com{encodeURIComponent(q)}&entity=song&limit=15&country=ru`);
            const data = await response.json();
            
            status.innerText = '';
            if (data.results.length === 0) {
                status.innerText = 'Ничего не найдено.';
                return;
            }

            globalTitle.style.display = 'block';
            data.results.forEach(t => {
                if (t.previewUrl) {
                    resBox.innerHTML += `
                        <div class="card">
                            <img src="${t.artworkUrl100.replace('100x100', '200x200')}">
                            <div class="info">
                                <div>${t.trackName}</div>
                                <span>${t.artistName}</span>
                                <audio controls src="${t.previewUrl}"></audio>
                            </div>
                        </div>`;
                }
            });
        } catch (e) {
            status.innerText = 'Ошибка поиска. Проверьте интернет.';
        }
    }
</script>

</body>
</html>
